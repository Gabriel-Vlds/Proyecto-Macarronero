services:
  - type: web
    name: macarronero-api
    env: node
    rootDir: macarronero-backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: MYSQL_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGIN
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_SUCCESS_URL
        sync: false
      - key: STRIPE_CANCEL_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: MUX_TOKEN_ID
        sync: false
      - key: MUX_TOKEN_SECRET
        sync: false

  - type: web
    name: macarronero-web
    env: static
    rootDir: macarronero-frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist/macarronero-frontend/browser
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NG_APP_API_BASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html